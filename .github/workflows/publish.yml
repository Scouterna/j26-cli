name: Release

on:
  push:
    branches:
      - main

permissions:
  id-token: write  # Required for OIDC
  contents: write # create tags, commits, GitHub releases
  issues: write # comment on issues when released
  pull-requests: write # comment on PRs when released
  
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # semantic-release needs full git history
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          version-file: .node-version
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci

      - run: npm run typecheck

      - run: npx --package semantic-release --package @semantic-release/changelog --package semantic-release/git semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
